<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Evitar error "Cannot set property fetch of #<Window> which has only a getter" en iFrames o entornos sandbox
      (function() {
        let originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return originalFetch;
            },
            set: function(newValue) {
              originalFetch = newValue;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("No se pudo redefinir window.fetch:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
